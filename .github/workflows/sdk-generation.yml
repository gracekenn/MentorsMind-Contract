name: Generate Contracts SDK

on:
  push:
    paths:
      - 'contracts/**'
      - 'escrow/**'
      - '.github/workflows/sdk-generation.yml'
  pull_request:
    paths:
      - 'contracts/**'
      - 'escrow/**'

env:
  SOROBAN_CLI_VERSION: "21.0.0"

jobs:
  generate-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown

      - name: Build Contracts
        run: cargo build --workspace --target wasm32-unknown-unknown --release

      - name: Install Stellar CLI
        run: |
          cargo install --locked stellar-cli --version $SOROBAN_CLI_VERSION

      - name: Install Dependencies
        run: npm ci

      - name: Generate SDK TS Bindings
        run: npm run generate --workspace=@mentorminds/contracts-sdk

      - name: Commit diff
        if: github.event_name == 'push'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/contracts-sdk/src/generated
          if ! git diff --cached --quiet; then
            git commit -m "chore: Auto-generate Contracts TS SDK [skip ci]"
            git push
          fi
