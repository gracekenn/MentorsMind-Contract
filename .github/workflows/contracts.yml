name: Soroban Contracts CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SOROBAN_CLI_VERSION: "21.7.7"

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
      - name: Check Formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (SDK ${{ matrix.soroban-sdk }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        soroban-sdk: ["21.0.0", "20.1.1"] # Current and previous major/stable
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-test-${{ matrix.soroban-sdk }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Patch SDK version
        if: matrix.soroban-sdk != '21.0.0'
        run: |
          sed -i 's/soroban-sdk = "21.0.0"/soroban-sdk = "${{ matrix.soroban-sdk }}"/g' Cargo.toml
          sed -i 's/soroban-token-sdk = "21.0.0"/soroban-token-sdk = "${{ matrix.soroban-sdk }}"/g' Cargo.toml
          cargo update
      - name: Run Tests
        run: cargo test --workspace
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.soroban-sdk }}
          path: target/debug/deps/mentorminds_escrow* # Example path, adjust as needed

  build:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Build
        run: cargo build --target wasm32-unknown-unknown --release --workspace
      - name: Upload WASM
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: target/wasm32-unknown-unknown/release/*.wasm

  deploy:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install Stellar CLI
        run: |
          cargo install --locked stellar-cli --version $SOROBAN_CLI_VERSION
      - name: Deploy Escrow
        env:
          SOROBAN_ACCOUNT_SEED: ${{ secrets.SOROBAN_ACCOUNT_SEED }}
        run: |
          # Import identity
          stellar config identity add deployer --secret-key $SOROBAN_ACCOUNT_SEED
          # Deploy
          ESCROW_ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/mentorminds_escrow.wasm \
            --source deployer \
            --network testnet)
          echo "ESCROW_ID=$ESCROW_ID" >> $GITHUB_ENV
          echo "Deployed Escrow: $ESCROW_ID"
      - name: Notify Failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"🚨 CI/CD Deployment to Testnet FAILED on main branch!"}' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
